<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* ───────── Design tokens ───────── */
    :root {
      --bg: #ffffff;
      --bg-2: #f8fafc;
      --bg-3: #f1f5f9;
      --border: rgba(15,23,42,0.08);
      --border-strong: rgba(15,23,42,0.16);
      --text: #0f172a;
      --text-muted: #475569;
      --text-faint: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-text: #ffffff;
      --accent-bg: #eef2ff;
      --success: #10b981;
      --danger: #ef4444;
      --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
      --shadow-md: 0 4px 16px rgba(15,23,42,0.08), 0 1px 4px rgba(15,23,42,0.04);
      --radius-sm: 6px;
      --radius-md: 10px;
      --pill: 999px;
      --tx: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      --mono: ui-monospace, SFMono-Regular, 'JetBrains Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --bg-2: #1e293b;
        --bg-3: #334155;
        --border: rgba(248,250,252,0.08);
        --border-strong: rgba(248,250,252,0.16);
        --text: #f1f5f9;
        --text-muted: #cbd5e1;
        --text-faint: #64748b;
        --accent: #818cf8;
        --accent-hover: #6366f1;
        --accent-bg: rgba(99,102,241,0.18);
        --success: #34d399;
        --danger: #f87171;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
        --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px; max-height: 560px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      overflow-y: auto;
    }

    /* ───────── Header ───────── */
    header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    header h1 {
      font: 700 14px var(--font);
      letter-spacing: -0.2px;
      flex: 1;
    }
    header .badge {
      font: 700 11px var(--font);
      padding: 2px 9px;
      border-radius: var(--pill);
      background: var(--accent);
      color: var(--accent-text);
      min-width: 22px;
      text-align: center;
    }

    /* ───────── Origin row ───────── */
    .origin-row {
      padding: 8px 16px;
      font: 11px var(--mono);
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      word-break: break-all;
      background: var(--bg-2);
    }
    .origin-row .label {
      color: var(--text-faint);
      font: 11px var(--font);
      margin-right: 6px;
    }

    /* ───────── Status ───────── */
    .status-bar {
      padding: 9px 16px;
      font-size: 11px;
      display: flex; align-items: center; gap: 7px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-faint);
      flex: 0 0 auto;
    }
    .status-dot.connected { background: var(--success); }

    /* ───────── Activation row ───────── */
    .activation-row {
      padding: 12px 16px;
      display: flex; gap: 10px; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    #btn-pick {
      flex: 1;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: var(--accent-text);
      border: 0;
      font: 600 12.5px var(--font);
      cursor: pointer;
      transition: background var(--tx), opacity var(--tx);
    }
    #btn-pick:hover:not(:disabled) { background: var(--accent-hover); }
    #btn-pick:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: var(--bg-3);
      color: var(--text-faint);
    }
    .toggle-disabled {
      display: flex; align-items: center; gap: 6px;
      font: 500 11px var(--font);
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      padding: 5px 9px;
      border-radius: var(--radius-sm);
      transition: background var(--tx);
    }
    .toggle-disabled:hover { background: var(--bg-2); }
    .toggle-disabled input { margin: 0; cursor: pointer; accent-color: var(--accent); }

    /* ───────── Queue list ───────── */
    #queue-list {
      max-height: 280px;
      overflow-y: auto;
    }
    .route-group + .route-group { border-top: 1px solid var(--border); }
    .route-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      background: var(--bg-2);
      font: 600 11px var(--mono);
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
      letter-spacing: 0.2px;
    }
    .route-path {
      flex: 1;
      min-width: 0;
      word-break: break-all;
    }
    .route-count {
      font: 700 10px var(--font);
      color: var(--accent-text);
      background: var(--accent);
      padding: 2px 8px;
      border-radius: var(--pill);
    }
    .queue-item {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      transition: background var(--tx);
    }
    .queue-item:last-child { border-bottom: 0; }
    .queue-item:hover { background: var(--bg-2); }
    .queue-item .elements {
      display: flex; flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .queue-item .comment {
      font: 13px var(--font);
      color: var(--text);
      white-space: pre-wrap;
      line-height: 1.45;
    }
    .queue-item.editing { background: var(--bg-2); }
    .queue-item .item-actions {
      margin-top: 8px;
      display: flex;
      gap: 14px;
    }
    .queue-item .item-actions button {
      font: 500 12px var(--font);
      background: none;
      border: 0;
      cursor: pointer;
      padding: 0;
      transition: opacity var(--tx);
    }
    .queue-item .item-actions button:hover { opacity: 0.7; }
    .queue-item .edit { color: var(--accent); }
    .queue-item .remove { color: var(--danger); }

    .queue-item .edit-comment {
      width: 100%;
      min-height: 64px;
      margin-top: 6px;
      border: 1px solid var(--border-strong);
      background: var(--bg);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font: 13px var(--font);
      resize: vertical;
      outline: none;
      transition: border-color var(--tx), box-shadow var(--tx);
    }
    .queue-item .edit-comment:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .queue-item .edit-actions {
      margin-top: 10px;
      display: flex; gap: 6px;
      justify-content: flex-end;
    }
    .queue-item .edit-actions button {
      font: 600 12px var(--font);
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--tx);
    }
    .queue-item .save {
      background: var(--accent);
      color: var(--accent-text);
      border: 0;
    }
    .queue-item .save:hover { background: var(--accent-hover); }
    .queue-item .cancel {
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border-strong);
    }
    .queue-item .cancel:hover { background: var(--bg-2); color: var(--text); }

    /* ───────── Element chips ───────── */
    .el-chip {
      display: inline-flex; align-items: center; gap: 5px;
      margin-right: 6px;
      margin-bottom: 4px;
      padding: 3px 8px 3px 3px;
      border-radius: var(--pill);
      background: var(--bg-2);
      border: 1px solid var(--border);
    }
    .el-chip .el-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 16px; height: 16px;
      padding: 0 5px;
      background: var(--accent);
      color: #ffffff;
      border-radius: var(--pill);
      font: 700 10px var(--font);
    }
    .el-chip code {
      font: 10.5px var(--mono);
      color: var(--text-muted);
    }
    .el-chip .el-remove {
      width: 16px; height: 16px;
      line-height: 14px;
      text-align: center;
      border: 0;
      background: var(--bg-3);
      color: var(--text-muted);
      border-radius: var(--pill);
      cursor: pointer;
      padding: 0;
      font: 700 12px var(--font);
      transition: background var(--tx), color var(--tx);
    }
    .el-chip .el-remove:hover { background: var(--danger); color: #ffffff; }

    /* ───────── Empty state ───────── */
    .empty-state {
      padding: 28px 16px;
      text-align: center;
      color: var(--text-faint);
      font: 12px var(--font);
      line-height: 1.55;
    }

    /* ───────── Action bar ───────── */
    .actions {
      padding: 12px 16px;
      display: flex; gap: 8px;
      border-top: 1px solid var(--border);
      background: var(--bg-2);
    }
    .actions button {
      flex: 1;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      font: 600 12px var(--font);
      cursor: pointer;
      border: 0;
      transition: background var(--tx), opacity var(--tx);
    }
    .actions button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .btn-copy {
      background: var(--text);
      color: var(--bg);
    }
    .btn-copy:hover:not(:disabled) { opacity: 0.85; }
    .btn-send {
      background: var(--success);
      color: #ffffff;
    }
    .btn-send:hover:not(:disabled) { opacity: 0.92; }
    .btn-clear {
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border-strong) !important;
    }
    .btn-clear:hover:not(:disabled) { background: var(--bg-3); color: var(--danger); }

    .actions:last-of-type { border-top: 0; padding-top: 0; }
  </style>
</head>
<body>
  <header>
    <h1>Website Overlay</h1>
    <span class="badge" id="count-badge">0</span>
  </header>

  <div class="origin-row">
    <span class="label">Origin</span>
    <span id="origin-label">—</span>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Sidecar: checking…</span>
  </div>

  <div class="activation-row">
    <button id="btn-pick">🎯 Start picking</button>
    <label class="toggle-disabled">
      <input type="checkbox" id="toggle-disabled">
      Disable here
    </label>
  </div>

  <div id="queue-list"></div>
  <div id="other-origins" style="display:none;border-top:1px solid var(--border);padding-bottom:8px"></div>

  <div class="actions">
    <button class="btn-copy" id="btn-copy" disabled>📋 Copy for AI</button>
    <button class="btn-send" id="btn-send" disabled>📡 Send to project</button>
  </div>
  <div class="actions">
    <button class="btn-clear" id="btn-clear" disabled>Clear queue</button>
  </div>

  <script src="dist/popup.js"></script>
</body>
</html>
